<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Проверка игрока</title>

<style>
body{
    background:#0f0f0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:80px;
}

.card{
    width:400px;
    margin:auto;
    background:#1b1b1b;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    color:#00ff99;
}

.btn{
    display:block;
    margin:15px 0;
    padding:15px;
    background:#00ff99;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<div class="card">
<h1>Проверка игрока</h1>

<p>Для прохождения проверки откройте ссылки ниже</p>

<a class="btn" href="https://steamcommunity.com/" target="_blank">
Steam
</a>

<a class="btn" href="https://discord.com/" target="_blank">
Discord
</a>

<a class="btn" href="https://funpay.com/" target="_blank">
FunPay
</a>

<a class="btn" href="https://www.youtube.com/results?search_query=gta+5+cheat+check"
target="_blank">
История читов
</a>

</div>

</body>
</html>
